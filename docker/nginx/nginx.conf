# Map para manejar correctamente el header Connection en WebSocket vs HTTP normal.
# Sin esto, 'Connection: Upgrade' hardcodeado puede romper requests HTTP normales
# que lleguen al mismo location block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name leviathan.tail4af8a1.ts.net localhost;
    client_max_body_size 0;
    root /var/www/html/public;

    index index.php index.html;

    charset utf-8;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Resolver para DNS interno de Docker
    resolver 127.0.0.11 valid=30s;

    # -------------------------------------------------------
    # Reverb WebSocket — debe ir ANTES de location /
    # -------------------------------------------------------
    location ~ ^/app/ {
        proxy_pass http://reverb:8081;
        proxy_http_version 1.1;

        # Headers obligatorios para WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_hide_header X-Powered-By;

        # WebSockets son conexiones long-lived — sin timeouts altos Nginx las corta
        proxy_connect_timeout  60s;
        proxy_send_timeout     3600s;
        proxy_read_timeout     3600s;
    }

    # -------------------------------------------------------
    # Vite dev assets y HMR WebSocket (solo desarrollo)
    # -------------------------------------------------------
    location ~ ^/(@vite|@fs|@id|@react-refresh|__vite_ping|node_modules) {
        proxy_pass http://vite:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # -------------------------------------------------------
    # Laravel Octane (HTTP)
    # -------------------------------------------------------
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts generosos para Octane (evita ERR_EMPTY_RESPONSE durante arranque)
        proxy_connect_timeout       60s;
        proxy_send_timeout          60s;
        proxy_read_timeout          60s;

        # Reintentar si Octane aún no está listo
        proxy_next_upstream         error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries   3;
        proxy_next_upstream_timeout 30s;
    }

    # Static files caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
