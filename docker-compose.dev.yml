services:

  # =========================
  # APP (Laravel Octane)
  # =========================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: development
    container_name: contentflow_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./storage:/var/www/html/storage
      - ./docker/php/php_dev.ini:/usr/local/etc/php/conf.d/local.ini
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - cf_vendor_v2:/var/www/html/vendor
      - cf_node_modules_v2:/var/www/html/node_modules
    env_file:
      - .env.docker
    environment:
      LARAVEL_OCTANE: "1"
      OCTANE_SERVER: swoole
    command: php artisan octane:start --server=swoole --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - laravel

  # =========================
  # NGINX (LO QUE EXPONES)
  # =========================
  nginx:
    image: nginx:alpine
    container_name: contentflow_nginx_dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
      - reverb
    networks:
      - laravel

  pgsql:
    image: postgres:15-alpine
    container_name: contentflow_pgsql_dev
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel

  redis:
    image: redis:7-alpine
    container_name: contentflow_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - laravel

  queue:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: contentflow_queue_dev
    restart: unless-stopped
    command: php artisan queue:work --tries=3
    volumes:
      - ./:/var/www/html
      - cf_vendor_v2:/var/www/html/vendor
    env_file:
      - .env.docker
    depends_on:
      - app
      - redis
    networks:
      - laravel
  reverb:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: contentflow_reverb_dev
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --debug
    ports:
      - "8081:8080"
    volumes:
      - ./:/var/www/html
      - cf_vendor_v2:/var/www/html/vendor
    env_file:
      - .env.docker
    depends_on:
      - app
      - redis
    networks:
      - laravel

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: contentflow_scheduler_dev
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
      - cf_vendor_v2:/var/www/html/vendor
    env_file:
      - .env.docker
    depends_on:
      - app
      - redis
    networks:
      - laravel

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: contentflow_redis_commander_dev
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8082:8081"
    depends_on:
      - redis
    networks:
      - laravel

  vite:
    image: node:20-alpine
    container_name: contentflow_vite_dev
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
    networks:
      - laravel

networks:
  laravel:
    name: contentflow_network_dev
    driver: bridge

volumes:
  pgsql_data:
    name: contentflow_pgsql_data_shared
  redis_data:
    name: contentflow_redis_data_shared
  cf_vendor_v2:
    name: contentflow_vendor_dev
  cf_node_modules_v2:
    name: contentflow_node_modules_dev
  cf_vite_cache:
    name: contentflow_vite_cache_dev
